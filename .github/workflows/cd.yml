name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild_frontend:
        description: 'Force rebuild frontend'
        required: false
        default: false
        type: boolean
      rebuild_backend:
        description: 'Force rebuild backend'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Production Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run build

      - name: Backend syntax check
        run: python -m compileall -q backend

  check-frontend-changes:
    name: Check Frontend Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'vercel.json'
              - '.github/workflows/cd.yml'

  check-backend-changes:
    name: Check Backend Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'render.yaml'
              - '.github/workflows/cd.yml'

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [quality-gate, check-frontend-changes]
    environment: production
    if: |
      needs.check-frontend-changes.outputs.changed == 'true' || 
      github.event.inputs.rebuild_frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger frontend deployment
        id: deploy
        env:
          DEPLOY_HOOK: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "FRONTEND_DEPLOY_HOOK_URL not configured — skipping."
            exit 0
          fi
          RESPONSE=$(curl -w "\n%{http_code}" -X POST "$DEPLOY_HOOK")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "response=$BODY" >> $GITHUB_OUTPUT
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Frontend deployment triggered (HTTP $HTTP_CODE)"
          else
            echo "❌ Failed to trigger frontend deployment (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Wait for frontend deployment
        run: |
          echo "Frontend deployment webhook triggered. Monitoring may require Vercel API access."
          echo "Response: ${{ steps.deploy.outputs.response }}"

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [quality-gate, check-backend-changes]
    environment: production
    if: |
      needs.check-backend-changes.outputs.changed == 'true' || 
      github.event.inputs.rebuild_backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger backend deployment
        id: deploy
        env:
          DEPLOY_HOOK: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "BACKEND_DEPLOY_HOOK_URL not configured — skipping."
            exit 0
          fi
          RESPONSE=$(curl -w "\n%{http_code}" -X POST "$DEPLOY_HOOK")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "response=$BODY" >> $GITHUB_OUTPUT
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Backend deployment triggered (HTTP $HTTP_CODE)"
          else
            echo "❌ Failed to trigger backend deployment (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Wait for backend deployment
        run: |
          echo "Backend deployment webhook triggered. Monitoring may require Render API access."
          echo "Response: ${{ steps.deploy.outputs.response }}"

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality-gate, check-frontend-changes, check-backend-changes, deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║       DEPLOYMENT SUMMARY               ║"
          echo "╠════════════════════════════════════════╣"
          echo "Quality gate:        ${{ needs.quality-gate.result }}"
          echo ""
          echo "Frontend:"
          echo "  Changes detected:  ${{ needs.check-frontend-changes.outputs.changed }}"
          echo "  Deploy status:     ${{ needs.deploy-frontend.result }}"
          echo ""
          echo "Backend:"
          echo "  Changes detected:  ${{ needs.check-backend-changes.outputs.changed }}"
          echo "  Deploy status:     ${{ needs.deploy-backend.result }}"
          echo "╚════════════════════════════════════════╝"
          
          if [ "${{ needs.quality-gate.result }}" != "success" ]; then
            echo "⚠️  Quality gate failed - deployments may not have been triggered"
            exit 1
          fi
