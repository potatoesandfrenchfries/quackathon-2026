services:
  - type: web
    name: buddy-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: buddy-finance
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: '["https://buddy-sand-six.vercel.app","http://localhost:3000"]'
      - key: ENVIRONMENT
        value: production
